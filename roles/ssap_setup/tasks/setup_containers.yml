---
# Setup Container Registry and Pull Required Images
- name: Podman login to registry.redhat.io
  containers.podman.podman_login:
    registry: registry.redhat.io
    username: "{{ ssap_podman_registry_username }}"
    password: "{{ ssap_podman_registry_password }}"
    authfile: "{{ ssap_podman_authfile }}"
  register: r_ssap_podman_login

- name: Ensure user containers config directory exists
  ansible.builtin.file:
    path: "/root/.config/containers"
    state: directory
    mode: '0700'

- name: Copy auth.json to user config directory
  ansible.builtin.copy:
    src: "{{ ssap_podman_authfile }}"
    dest: "/root/.config/containers/auth.json"
    remote_src: true
    mode: '0600'

