---
# AAP Controller connection settings
aap_api_controller_url: https://aap.example.com
aap_api_controller_username: <CHANGEME>
aap_api_controller_password: <CHANGEME>
aap_api_controller_verify_ssl: false

# AAP API endpoints configuration - Universal approach
# Each endpoint requires 'name' and 'endpoint' at minimum
# Additional fields depend on the resource type

aap_api_endpoints:
  # Example 1: OpenShift Credential
  - name: openshift-credential
    endpoint: credentials
    api: /api/controller/v2/
    description: OpenShift cluster credential
    organization: Default
    credential_type: OpenShift or Kubernetes API Bearer Token
    attributes:
      inputs:
        host: "{{ openshift_api_url }}"
        bearer_token: "{{ openshift_api_token }}"
        verify_ssl: true

  # Example 2: Machine Credential (SSH)
  # - name: linux-servers-credential
  #   endpoint: credentials
  #   description: SSH credential for Linux servers
  #   organization: Default
  #   credential_type: Machine
  #   attributes:
  #     inputs:
  #       username: ansible
  #       ssh_key_data: "{{ lookup('file', '/path/to/ssh/key') }}"
  #       become_method: sudo

  # Example 3: Project (Git Repository)
  # - name: my-ansible-project
  #   endpoint: projects
  #   description: Ansible playbooks repository
  #   organization: Default
  #   attributes:
  #     scm_type: git
  #     scm_url: https://github.com/example/ansible-playbooks.git
  #     scm_branch: main
  #     scm_update_on_launch: true
  #     scm_delete_on_update: true

  # Example 4: Inventory
  # - name: production-inventory
  #   endpoint: inventories
  #   description: Production servers inventory
  #   organization: Default
  #   attributes:
  #     variables: |
  #       ---
  #       ansible_connection: ssh
  #       ansible_user: ansible

  # Example 5: Job Template
  # - name: deploy-application
  #   endpoint: job_templates
  #   description: Deploy application to production
  #   organization: Default
  #   project: my-ansible-project
  #   inventory: production-inventory
  #   attributes:
  #     playbook: deploy.yml
  #     job_type: run
  #     ask_variables_on_launch: true
  #     ask_limit_on_launch: true
  #     concurrent_jobs_enabled: false

  # Example 6: Organization
  # - name: Engineering
  #   endpoint: organizations
  #   description: Engineering team organization
  #   attributes:
  #     max_hosts: 100

  # Example 7: Team
  # - name: DevOps-Team
  #   endpoint: teams
  #   description: DevOps engineering team
  #   organization: Engineering

  # Example 8: AWS Credential
  # - name: aws-production
  #   endpoint: credentials
  #   description: AWS production account credentials
  #   organization: Default
  #   credential_type: Amazon Web Services
  #   attributes:
  #     inputs:
  #       username: "{{ aws_access_key_id }}"
  #       password: "{{ aws_secret_access_key }}"

  # Example 9: Host (Linux)
  # - name: web-server-01
  #   endpoint: hosts
  #   description: Production web server
  #   inventory: production-inventory
  #   attributes:
  #     variables: |
  #       ---
  #       ansible_host: 192.168.1.10
  #       ansible_connection: ssh
  #       ansible_user: ansible
  #     enabled: true

  # Example 10: Host (Windows)
  # - name: windows-server
  #   endpoint: hosts
  #   description: Windows Server 2019
  #   inventory: production-inventory
  #   attributes:
  #     variables: |
  #       ---
  #       ansible_host: 192.168.1.20
  #       ansible_connection: psrp
  #       ansible_psrp_auth: negotiate
  #       ansible_psrp_cert_validation: ignore
  #     enabled: true

# AAP Job Template Launches - Optional
# Use this to launch job templates after resources are created/updated
aap_api_job_launches: []
  # Example 1: Simple launch
  # - name: deploy-application
  #   organization: Default

  # Example 2: Launch with extra vars
  # - name: deploy-application
  #   organization: Default
  #   extra_vars:
  #     environment: production
  #     version: v1.2.3

  # Example 3: Launch and wait for completion
  # - name: deploy-application
  #   organization: Default
  #   wait: true
  #   wait_retries: 60
  #   wait_delay: 10
  #   extra_vars:
  #     environment: staging

  # Example 4: Launch with limit and tags
  # - name: configure-servers
  #   organization: Default
  #   limit: web-servers
  #   tags: nginx,ssl
  #   skip_tags: debug
