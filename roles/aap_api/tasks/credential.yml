---
- name: Set AAP Controller connection variables
  ansible.builtin.set_fact:
    _controller_api: "{{ _endpoint.api | default('/api/controller/v2/') }}"
    _controller_url: "{{ aap_api_controller_url }}"
    _controller_username: "{{ aap_api_controller_username }}"
    _controller_password: "{{ aap_api_controller_password }}"
    _controller_verify_ssl: "{{ aap_api_controller_verify_ssl }}"
    _controller_org: "{{ _endpoint.organization | default('Default') }}"
    _controller_cred_type: "{{ _endpoint.credential_type | default('Machine') }}"
    _controller_cred_desc: "{{ _endpoint.description | default(_endpoint.name) }}"
    _controller_cred_name: "{{ _endpoint.name }}"

- name: Get organization ID
  ansible.builtin.uri:
    url: "{{ _controller_url }}{{ _controller_api }}organizations/?name={{ _controller_org }}"
    method: GET
    user: "{{ _controller_username }}"
    password: "{{ _controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ _controller_verify_ssl }}"
    return_content: true
  register: r_org_response

- name: Validate organization response
  ansible.builtin.fail:
    msg: "Organization '{{ _controller_org }}' not found in AAP Controller"
  when: r_org_response.json.results | length == 0

- name: Set organization ID
  ansible.builtin.set_fact:
    organization_id: "{{ r_org_response.json.results[0].id }}"

- name: Get credential type for {{ _controller_cred_type }}
  ansible.builtin.uri:
    url: "{{ _controller_url }}{{ _controller_api }}credential_types/?name={{ _controller_cred_type | urlencode }}"
    method: GET
    user: "{{ _controller_username }}"
    password: "{{ _controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ _controller_verify_ssl }}"
    return_content: true
  register: cred_type_response

- name: Validate credential type response
  ansible.builtin.fail:
    msg: "Credential type '{{ _controller_cred_type }}' not found in AAP Controller"
  when: cred_type_response.json.results | length == 0

- name: Set credential type ID
  ansible.builtin.set_fact:
    credential_type_id: "{{ cred_type_response.json.results[0].id }}"

- name: Check if credential already exists
  ansible.builtin.uri:
    url: "{{ _controller_url }}{{ _controller_api }}credentials/?name={{ _controller_cred_name | urlencode }}&organization={{ organization_id }}"
    method: GET
    user: "{{ _controller_username }}"
    password: "{{ _controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ _controller_verify_ssl }}"
    return_content: true
  register: r_credential_check

- name: Set credential exists flag
  ansible.builtin.set_fact:
    credential_exists: "{{ r_credential_check.json.results | length > 0 }}"
    credential_id: "{{ r_credential_check.json.results[0].id | default('') }}"

- name: Update existing credential in AAP Controller
  ansible.builtin.uri:
    url: "{{ _controller_url }}{{ _controller_api }}credentials/{{ credential_id }}/"
    method: PATCH
    user: "{{ _controller_username }}"
    password: "{{ _controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ _controller_verify_ssl }}"
    status_code: [200, 201]
    body_format: json
    body:
      name: "{{ _controller_cred_name }}"
      description: "{{ _controller_cred_desc }}"
      organization: "{{ organization_id }}"
      credential_type: "{{ credential_type_id }}"
      inputs: "{{ _endpoint.inputs }}"
  register: r_update_credential
  when: credential_exists | bool

- name: Create new credential in AAP Controller
  ansible.builtin.uri:
    url: "{{ _controller_url }}{{ _controller_api }}credentials/"
    method: POST
    user: "{{ _controller_username }}"
    password: "{{ _controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ _controller_verify_ssl }}"
    status_code: [200, 201]
    body_format: json
    body:
      name: "{{ _controller_cred_name }}"
      description: "{{ _controller_cred_desc }}"
      organization: "{{ organization_id }}"
      credential_type: "{{ credential_type_id }}"
      inputs: "{{ _endpoint.inputs }}"
  register: r_create_credential
  when: not credential_exists | bool

- name: Print credential operation result
  ansible.builtin.debug:
    msg: "{{ r_update_credential if credential_exists else r_create_credential }}"