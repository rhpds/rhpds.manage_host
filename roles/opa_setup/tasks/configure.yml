---
# Configure OPA

- name: Generate OPA configuration file
  ansible.builtin.template:
    src: opa-config.yaml.j2
    dest: "{{ opa_config_file }}"
    mode: '0644'
  when: opa_use_config_file
  notify: restart opa

- name: Display configuration details
  ansible.builtin.debug:
    msg:
      - "OPA Configuration:"
      - "  Config file: {{ opa_config_file }}"
      - "  Server mode: {{ opa_mode }}"
      - "  Server port: {{ opa_server_port }}"
      - "  Diagnostic port: {{ opa_diagnostic_port }}"
      - "  Bundle enabled: {{ opa_bundle_enabled }}"
      - "  Decision logs enabled: {{ opa_decision_logs_enabled }}"
