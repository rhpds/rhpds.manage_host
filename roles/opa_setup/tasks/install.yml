---
# Setup OPA prerequisites for Quadlet

- name: Ensure podman is installed
  ansible.builtin.package:
    name: podman
    state: present

- name: Create OPA directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ opa_config_dir }}"
    - "{{ opa_data_dir }}"
    - "{{ opa_policy_dir }}"
    - "{{ opa_log_dir }}"

- name: Set appropriate permissions for data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'  # Allow container user to write
    recurse: false
  loop:
    - "{{ opa_data_dir }}"
    - "{{ opa_log_dir }}"
    - "{{ opa_policy_dir }}"

- name: Create Quadlet directory
  ansible.builtin.file:
    path: "{{ opa_quadlet_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Pull OPA container image
  containers.podman.podman_image:
    name: "{{ opa_container_image }}"
    state: present
  register: r_opa_image_pull

- name: Display OPA image details
  ansible.builtin.debug:
    msg: "OPA container image pulled: {{ opa_container_image }}"
