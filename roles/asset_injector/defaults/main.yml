---
# Asset Injector Module Configuration
# Universal approach - supports ANY Ansible module with dynamic parameter passing

# Required fields for each module:
#   - module: The Ansible module name (e.g., file, copy, dnf, service)
#   - description: Human-readable description of what the task does

# Control parameters (optional):
#   - become: Run with privilege escalation (default: false)
#   - become_user: User to become (default: root)
#   - when: Conditional execution (default: true)
#   - debug: Show detailed execution results (default: false)
#   - delegate_to: Delegate task to another host
#   - tags: Task tags for selective execution
#   - ignore_errors: Continue on error (default: false)
#   - changed_when: Override change detection
#   - failed_when: Override failure detection
#   - retries: Number of retries
#   - delay: Delay between retries
#   - until: Retry until condition is met
#   - notify: Handler to notify on change

# All other parameters are passed directly to the module

asset_injector_modules: []

